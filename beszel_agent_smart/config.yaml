name: "Beszel Agent (S.M.A.R.T.)"
description: "Beszel Agent Add-on with S.M.A.R.T. Monitoring Support"
version: "1.0.5"
slug: "beszel-agent-smart"
url: "https://github.com/mattjacobson6/ha-addons"
init: false
startup: application
boot: auto
watchdog: "http://[HOST]:[PORT:45877]/cgi-bin/health"
host_network: true
full_access: true
docker_api: true
host_dbus: true
privileged:
  - SYS_RAWIO
  - SYS_ADMIN
arch:
  - aarch64
  - amd64
ports:
  45876/tcp: 45876
  45877/tcp: 45877
ports_description:
  45876/tcp: "Beszel agent SSH listener"
  45877/tcp: "Home Assistant watchdog healthcheck endpoint. Not configurable; if this port is already in use, disable watchdog."
options:
  key: ""
  hub_url: ""
  token: ""
  environment_vars: []
  custom_volumes: []
schema:
  key: password
  hub_url: str
  token: password
  environment_vars:
    - name: str
      value: str
  custom_volumes:
    - host_path: str
      container_path: str
map:
  - type: data
    read_only: false
    path: /var/lib/beszel-agent
