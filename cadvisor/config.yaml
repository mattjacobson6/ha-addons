name: cAdvisor
description: >-
  Google's cAdvisor (Container Advisor) for monitoring container performance
  and resource usage. Collects, aggregates, and exports container metrics.
version: "1.0.1"
slug: cadvisor
url: https://github.com/mattjacobson6/ha-addons/tree/main/cadvisor

init: false
startup: services
boot: auto

arch:
  - amd64

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: cAdvisor Web UI and API

privileged: true
host_network: true
host_pid: true
apparmor: false
