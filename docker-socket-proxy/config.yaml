name: Docker Socket Proxy
version: "2.0.6"
slug: docker_socket_proxy
description: >-
  Expose a restricted view of the Docker socket over TCP using HAProxy.
  Lets tools like Watchtower, Portainer Agent, or Traefik reach Docker
  without full daemon access.
url: https://github.com/mattjacobson6/ha-addons/tree/main/docker-socket-proxy
stage: stable
advanced: true

arch:
  - amd64

init: false
docker_api: true
full_access: true

ports:
  2375/tcp: 2375
ports_description:
  2375/tcp: Docker Socket Proxy (HAProxy TCP)

# Default values — all write/dangerous endpoints are off by default
options:
  ALLOW_RESTARTS: false
  ALLOW_START: false
  ALLOW_STOP: false
  AUTH: false
  BUILD: false
  COMMIT: false
  CONFIGS: false
  CONTAINERS: true
  DISABLE_IPV6: false
  DISTRIBUTION: false
  EVENTS: true
  EXEC: false
  GRPC: false
  IMAGES: false
  INFO: true
  LOG_LEVEL: info
  NETWORKS: false
  NODES: false
  PING: true
  PLUGINS: false
  POST: false
  SECRETS: false
  SERVICES: false
  SESSION: false
  SOCKET_PATH: /var/run/docker.sock
  SWARM: false
  SYSTEM: false
  TASKS: false
  VERSION: false
  VOLUMES: false

schema:
  ALLOW_RESTARTS: bool
  ALLOW_START: bool
  ALLOW_STOP: bool
  AUTH: bool
  BUILD: bool
  COMMIT: bool
  CONFIGS: bool
  CONTAINERS: bool
  DISABLE_IPV6: bool
  DISTRIBUTION: bool
  EVENTS: bool
  EXEC: bool
  GRPC: bool
  IMAGES: bool
  INFO: bool
  LOG_LEVEL: list(debug|info|notice|warning|err|crit|alert|emerg)
  NETWORKS: bool
  NODES: bool
  PING: bool
  PLUGINS: bool
  POST: bool
  SECRETS: bool
  SERVICES: bool
  SESSION: bool
  SOCKET_PATH: str
  SWARM: bool
  SYSTEM: bool
  TASKS: bool
  VERSION: bool
  VOLUMES: bool
