global
    log stdout local0
    log stdout local1 notice
    pidfile /run/haproxy.pid
    maxconn 4000

defaults
    mode http
    log global
    option httplog
    timeout connect 10s
    timeout client 10s
    timeout server 10m
    timeout client-fin 10s
    timeout server-fin 10s

backend dockerbackend
    server dockersocket unix@%%SOCKET_PATH%% check

backend docker-events
    server dockersocket unix@%%SOCKET_PATH%% check
    timeout connect 10s
    timeout client 0
    timeout server 0

frontend dockerfrontend
    bind *:2375
    option http-server-close
    option forwardfor except 127.0.0.0/8

    # Deny non-GET/HEAD/POST requests by default
    acl allow_method method GET HEAD POST DELETE PUT PATCH
    http-request deny if !allow_method

    # Deny POST unless explicitly allowed
    acl allow_post method POST DELETE PUT PATCH
    acl post_enabled str(%%POST%%) -m str true
    http-request deny if allow_post !post_enabled

    # Container endpoints
    acl container_methods method GET HEAD POST DELETE PUT PATCH
    acl containers_path path_beg /containers/
    acl containers_enabled str(%%CONTAINERS%%) -m str true
    http-request deny if containers_path !containers_enabled

    # Auth endpoints
    acl auth_path path_beg /auth/
    acl auth_enabled str(%%AUTH%%) -m str true
    http-request deny if auth_path !auth_enabled

    # Build endpoints
    acl build_path path_beg /build/
    acl build_enabled str(%%BUILD%%) -m str true
    http-request deny if build_path !build_enabled

    # Commit endpoints
    acl commit_path path_beg /commit/
    acl commit_enabled str(%%COMMIT%%) -m str true
    http-request deny if commit_path !commit_enabled

    # Configs endpoints
    acl configs_path path_beg /configs/
    acl configs_enabled str(%%CONFIGS%%) -m str true
    http-request deny if configs_path !configs_enabled

    # Distribution endpoints
    acl distribution_path path_beg /distribution/
    acl distribution_enabled str(%%DISTRIBUTION%%) -m str true
    http-request deny if distribution_path !distribution_enabled

    # Events endpoint
    acl events_path path_beg /events
    acl events_enabled str(%%EVENTS%%) -m str true
    http-request deny if events_path !events_enabled

    # Exec endpoints
    acl exec_path path_beg /exec/
    acl exec_enabled str(%%EXEC%%) -m str true
    http-request deny if exec_path !exec_enabled

    # GRPC endpoint
    acl grpc_path path /grpc
    acl grpc_enabled str(%%GRPC%%) -m str true
    http-request deny if grpc_path !grpc_enabled

    # Images endpoints
    acl images_path path_beg /images/
    acl images_enabled str(%%IMAGES%%) -m str true
    http-request deny if images_path !images_enabled

    # Info endpoint
    acl info_path path /info
    acl info_enabled str(%%INFO%%) -m str true
    http-request deny if info_path !info_enabled

    # Networks endpoints
    acl networks_path path_beg /networks/
    acl networks_enabled str(%%NETWORKS%%) -m str true
    http-request deny if networks_path !networks_enabled

    # Nodes endpoints
    acl nodes_path path_beg /nodes/
    acl nodes_enabled str(%%NODES%%) -m str true
    http-request deny if nodes_path !nodes_enabled

    # Ping endpoint
    acl ping_path path /_ping
    acl ping_enabled str(%%PING%%) -m str true
    http-request deny if ping_path !ping_enabled

    # Plugins endpoints
    acl plugins_path path_beg /plugins/
    acl plugins_enabled str(%%PLUGINS%%) -m str true
    http-request deny if plugins_path !plugins_enabled

    # Secrets endpoints
    acl secrets_path path_beg /secrets/
    acl secrets_enabled str(%%SECRETS%%) -m str true
    http-request deny if secrets_path !secrets_enabled

    # Services endpoints
    acl services_path path_beg /services/
    acl services_enabled str(%%SERVICES%%) -m str true
    http-request deny if services_path !services_enabled

    # Session endpoint
    acl session_path path /session
    acl session_enabled str(%%SESSION%%) -m str true
    http-request deny if session_path !session_enabled

    # Swarm endpoints
    acl swarm_path path_beg /swarm/
    acl swarm_enabled str(%%SWARM%%) -m str true
    http-request deny if swarm_path !swarm_enabled

    # System endpoints
    acl system_path path_beg /system/
    acl system_enabled str(%%SYSTEM%%) -m str true
    http-request deny if system_path !system_enabled

    # Tasks endpoints
    acl tasks_path path_beg /tasks/
    acl tasks_enabled str(%%TASKS%%) -m str true
    http-request deny if tasks_path !tasks_enabled

    # Version endpoint
    acl version_path path /version
    acl version_enabled str(%%VERSION%%) -m str true
    http-request deny if version_path !version_enabled

    # Volumes endpoints
    acl volumes_path path_beg /volumes/
    acl volumes_enabled str(%%VOLUMES%%) -m str true
    http-request deny if volumes_path !volumes_enabled

    # Allow RESTARTS specifically
    acl restarts_path path_beg /containers/ path_beg /services/
    acl restart_method method POST
    acl restart_action path_reg /containers/.*/restart$ /services/.*/update$
    acl allow_restarts str(%%ALLOW_RESTARTS%%) -m str true
    http-request deny if restarts_path restart_method restart_action !allow_restarts

    # Allow STOP specifically
    acl stop_path path_beg /containers/
    acl stop_method method POST
    acl stop_action path_reg /containers/.*/stop$
    acl allow_stop str(%%ALLOW_STOP%%) -m str true
    http-request deny if stop_path stop_method stop_action !allow_stop

    # Allow START specifically
    acl start_path path_beg /containers/
    acl start_method method POST
    acl start_action path_reg /containers/.*/start$
    acl allow_start str(%%ALLOW_START%%) -m str true
    http-request deny if start_path start_method start_action !allow_start

    # Route /events to special backend with unlimited timeout
    use_backend docker-events if events_path

    # Default backend
    default_backend dockerbackend
