name: Dozzle Agent
description: >-
  Lightweight Docker log aggregator and viewer. View Docker container logs
  in real-time with a simple web interface.
version: "1.0.0"
slug: dozzle_agent
url: https://github.com/mattjacobson6/ha-addons/tree/main/dozzle-agent

init: false
startup: services
boot: auto

arch:
  - amd64

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Dozzle Web UI (HTTP)

docker_api: true

healthcheck:
  enabled: true
  interval: 30s
  timeout: 10s
  retries: 3

options:
  log_level: info

schema:
  log_level: select(debug|info|warn|error)
