name: Obico ML
description: >-
  AI-powered 3D printer failure detection using The Spaghetti Detective's
  machine learning model. Detects print failures, tangles, and other issues
  in real-time via webcam analysis.
version: "1.7.0"
slug: obico_ml
url: https://github.com/mattjacobson6/ha-addons/tree/main/obico-ml

init: false
startup: services
boot: auto

arch:
  - amd64
  - aarch64

ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: Obico ML API (REST endpoint)

webui: "http://[HOST]:[PORT:3333]"

healthcheck:
  enabled: true
  interval: 30s
  timeout: 10s
  retries: 3

# Configuration options exposed to HA users
options:
  detection_interval: 2
  video_rotation_degree: 0
  verbosity: info

schema:
  detection_interval: int(1,30)
  video_rotation_degree: select(0|90|180|270)
  verbosity: select(debug|info|warning|error)
