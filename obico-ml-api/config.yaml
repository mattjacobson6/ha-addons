name: "Obico ML API"
description: "Obico ML failure detection API server for 3D print monitoring. Built from official Obico source."
version: "1.0.1"
slug: "obico_ml_api"
init: false
arch:
  - amd64
startup: services
boot: auto
ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: "Obico ML API REST endpoint"
options:
  ml_api_token: "obico_api_secret"
schema:
  ml_api_token: str
