name: "Obico ML API"
description: "Obico ML failure detection API server for 3D print monitoring. Built from The Spaghetti Detective's Container"
version: "1.0.7"
slug: "obico_ml_api"

init: false
startup: services
boot: auto

arch:
  - amd64

ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: "Obico ML API REST endpoint"

healthcheck:
  enabled: true
  interval: 30s
  timeout: 10s
  retries: 3
