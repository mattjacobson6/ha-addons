---
name: pgAdmin4
version: "1.0.29"
slug: pgadmin4
description: A PostgreSQL Management and Query tool
url: https://github.com/mattjacobson6/ha-addons/tree/main/pgadmin4

arch:
  - aarch64
  - amd64
  - i386
  - armv7

ingress: true
panel_icon: mdi:database
panel_title: pgAdmin4

hassio_api: true
auth_api: true
init: false
homeassistant: "0.92.0"
timeout: 20

ports:
  80/tcp: 80
  443/tcp: 443
ports_description:
  80/tcp: Web interface HTTP (not required when using Ingress)
  443/tcp: Web interface HTTPS/SSL (not required when using Ingress)

map:
  - ssl:rw
  - share:rw
  - data:rw

options:
  ssl: true
  certfile: fullchain.pem
  keyfile: privkey.pem
  pgadmin_default_email: admin@example.com
  pgadmin_default_password: changeme
  system_packages: []
  init_commands: []
  leave_front_door_open: false

schema:
  ssl: bool
  certfile: str
  keyfile: str
  pgadmin_default_email: str
  pgadmin_default_password: str
  system_packages:
    - str
  init_commands:
    - str
  leave_front_door_open: bool?
